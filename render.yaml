# Render Blueprint — Backend Deployment
services:
  - type: web
    name: cloud-command-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM_EMAIL
        value: onboarding@resend.dev
      - key: MAIL_FROM_NAME
        value: Cloud Command
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: ENABLE_BACKGROUND_PINGER
        value: true
      - key: ENABLE_SCHEDULED_JOBS
        value: true
      - key: ENABLE_SELF_PING
        value: false
      - key: MIN_MONITOR_INTERVAL_SECONDS
        value: 300
      - key: MONITOR_LOG_RETENTION_PER_MONITOR
        value: 500
      - key: PYTHON_VERSION
        value: 3.11.0
