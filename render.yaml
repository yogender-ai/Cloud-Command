# Render Blueprint — Backend Deployment
services:
  - type: web
    name: cloud-command-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM_EMAIL
        value: onboarding@resend.dev
      - key: MAIL_FROM_NAME
        value: Cloud Command
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: ENABLE_BACKGROUND_PINGER
        value: true
      - key: ENABLE_SCHEDULED_JOBS
        value: true
      - key: ENABLE_SELF_PING
        value: true
      - key: BACKGROUND_WORKER_INTERVAL_SECONDS
        value: 840
      - key: PINGER_CACHE_REFRESH_SECONDS
        value: 21600
      - key: PINGER_WRITE_RESULTS
        value: false
      - key: PINGER_MEMORY_LOGS_PER_MONITOR
        value: 96
      - key: MONITOR_REQUEST_TIMEOUT_SECONDS
        value: 45
      - key: BACKGROUND_WORKER_TIMEOUT_SECONDS
        value: 60
      - key: MIN_MONITOR_INTERVAL_SECONDS
        value: 840
      - key: MONITOR_LOG_RETENTION_PER_MONITOR
        value: 250
      - key: PYTHON_VERSION
        value: 3.11.0
