# Render Blueprint — Backend Deployment
services:
  - type: web
    name: cloud-command-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM_EMAIL
        value: onboarding@resend.dev
      - key: MAIL_FROM_NAME
        value: Cloud Command
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
